server {
    listen 8000 default_server;
    server_name _;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Vite-built hashed assets — long cache (immutable, content-addressed)
    location /assets/ {
        root /app/static;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Static files (images, fonts, etc.)
    location ~* \.(png|jpg|jpeg|ico|svg|woff2?|ttf|eot|gif|webp)$ {
        root /app/static;
        expires 1h;
        add_header Cache-Control "public";
    }

    # Firebase auth handler — proxy to Firebase hosting for custom authDomain
    location /__/ {
        proxy_pass https://instantnews-d0a72.firebaseapp.com;
        proxy_set_header Host instantnews-d0a72.firebaseapp.com;
        proxy_ssl_server_name on;
    }

    # API requests — proxy to Gunicorn
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Health check endpoint
    location /health {
        access_log off;
        proxy_pass http://127.0.0.1:8001/api/stats;
    }

    # All page routes — proxy to Flask (/, /terminal, /pricing, /account, /docs, etc.)
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
