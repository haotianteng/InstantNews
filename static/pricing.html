<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIGNAL — Pricing</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='12' fill='%230d1117'/><path d='M20 65 L35 40 L50 55 L65 25 L80 45' stroke='%233fb950' stroke-width='6' fill='none' stroke-linecap='round' stroke-linejoin='round'/><circle cx='80' cy='45' r='5' fill='%233fb950'/></svg>">

  <style>
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
    }

    .pricing-page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    .pricing-header {
      text-align: center;
      margin-bottom: 48px;
    }

    .pricing-header .logo-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text-primary);
      font-size: 18px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 24px;
    }

    .pricing-header h1 {
      font-size: 36px;
      font-weight: 700;
      margin: 16px 0 8px;
    }

    .pricing-header p {
      font-size: 16px;
      color: var(--text-secondary);
      max-width: 500px;
      margin: 0 auto;
    }

    /* pricing-grid styles come from landing.css via pricing-renderer.js import */
    .pricing-grid {
      margin-bottom: 40px;
    }

    .trial-badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      color: var(--green);
      margin-bottom: 8px;
    }

    .pricing-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
    }

    .pricing-card.featured {
      border-color: var(--green);
      position: relative;
    }

    .pricing-card.featured::before {
      content: "MOST POPULAR";
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--green);
      color: #000;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 3px 12px;
      border-radius: 10px;
    }

    .pricing-card h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .pricing-card .tier-desc {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    .price {
      margin-bottom: 20px;
    }

    .price .amount {
      font-size: 40px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }

    .price .period {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .feature-list {
      list-style: none;
      padding: 0;
      margin: 0 0 24px;
      flex: 1;
    }

    .feature-list li {
      font-size: 13px;
      padding: 6px 0;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
    }

    .feature-list li.included {
      color: var(--text-primary);
    }

    .feature-list .check {
      color: var(--green);
      font-weight: 700;
      flex-shrink: 0;
      width: 16px;
      text-align: center;
    }

    .feature-list .cross {
      color: var(--text-muted, #484f58);
      flex-shrink: 0;
      width: 16px;
      text-align: center;
    }

    .btn-subscribe {
      display: block;
      width: 100%;
      padding: 10px 0;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      border-radius: 8px;
      border: 1px solid var(--border);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-subscribe.primary {
      background: var(--green);
      color: #000;
      border-color: var(--green);
    }

    .btn-subscribe.primary:hover {
      opacity: 0.9;
    }

    .btn-subscribe.secondary {
      background: var(--bg-surface-2);
      color: var(--text-primary);
    }

    .btn-subscribe.secondary:hover {
      border-color: var(--text-secondary);
    }

    .btn-subscribe:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .pricing-footer {
      text-align: center;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .pricing-footer a {
      color: var(--blue);
      text-decoration: none;
    }

    .alert {
      max-width: 500px;
      margin: 0 auto 24px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
    }

    .alert.success {
      background: rgba(63, 185, 80, 0.1);
      color: var(--green);
      border: 1px solid rgba(63, 185, 80, 0.3);
    }

    .alert.canceled {
      background: rgba(210, 153, 34, 0.1);
      color: var(--yellow);
      border: 1px solid rgba(210, 153, 34, 0.3);
    }
  </style>
  <script type="module" crossorigin src="/assets/pricing-BpMTpt_J.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/auth-C4Y_TkCR.js">
  <link rel="modulepreload" crossorigin href="/assets/checkout-D4SXS1Jd.js">
  <link rel="stylesheet" crossorigin href="/assets/checkout-D93VMLs_.css">
  <link rel="stylesheet" crossorigin href="/assets/base-DBeiAWLw.css">
  <link rel="stylesheet" crossorigin href="/assets/terminal-QVAFLMBh.css">
</head>
<body>
  <div class="pricing-page">
    <div class="pricing-header">
      <a href="/" class="logo-link">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#3fb950" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 17 8 10 13 14 17 6 21 11"/>
          <circle cx="21" cy="11" r="2" fill="#3fb950" stroke="none"/>
        </svg>
        SIGNAL
      </a>
      <h1>Choose Your Plan</h1>
      <p>Real-time financial news intelligence. Start free, upgrade when you need more. Cancel any time.</p>
    </div>

    <!-- Success/Cancel alerts -->
    <div id="alert-container"></div>

    <div class="pricing-grid" id="pricing-page-grid">
      <!-- Rendered dynamically by pricing.js from /api/pricing -->
      <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-secondary)">Loading plans...</div>
    </div>

    <div class="pricing-footer">
      <p>All plans include 15+ financial news sources. Pro includes 5-second refresh.</p>
      <p>Questions? <a href="mailto:support@instnews.net">Contact us</a> &middot; <a href="/account">Account</a> &middot; <a href="/terminal">Back to terminal</a></p>
    </div>
  </div>

</body>
</html>
